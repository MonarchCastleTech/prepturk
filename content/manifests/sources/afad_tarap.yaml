name: afad_tarap
base_url: "https://www.afad.gov.tr/turkiye-afet-risk-azaltma-plani-tarap"
fetch_strategy: "html_page"
robots_note: "Resmî kurum, kamu tüzel kişiliği"
rate_limit_per_minute: 15
default_storage_mode: mirrored
default_trust_level: official
default_rights_status: public-download
schedule: "0 3 * * 1"
content_selectors:
  mime_types: ["text/html", "application/pdf"]
  file_patterns: ["*.pdf"]
html_allowed: true
pdf_allowed: true
province_mapping: null
language_default: tr
