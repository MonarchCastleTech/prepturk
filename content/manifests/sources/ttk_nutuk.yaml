name: ttk_nutuk
base_url: "https://www.ttk.gov.tr/karekod/nutuk.pdf"
fetch_strategy: "pdf_direct"
robots_note: "Kurumsal kaynak, kamu tüzel kişiliği"
rate_limit_per_minute: 10
default_storage_mode: mirrored
default_trust_level: institutional
default_rights_status: public-download
schedule: "0 4 * * 0"
content_selectors:
  mime_types: ["application/pdf"]
  file_patterns: ["*.pdf"]
html_allowed: false
pdf_allowed: true
province_mapping: null
language_default: tr
