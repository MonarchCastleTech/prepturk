<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    font-family: 'system-ui', sans-serif;
  }
  .container {
    width: 512px;
    height: 512px;
    position: relative;
  }
  svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
  }
</style>
</head>
<body>
<div class="container">
<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Tactical Hexagon Frame -->
  <path d="M256 20 L470 120 L470 392 L256 492 L42 392 L42 120 Z" fill="#0F172A" stroke="#334155" stroke-width="8"/>
  <path d="M256 40 L450 130 L450 382 L256 472 L62 382 L62 130 Z" fill="none" stroke="#1E293B" stroke-width="2"/>
  
  <!-- Corner "Bolts" -->
  <circle cx="256" cy="20" r="6" fill="#475569"/>
  <circle cx="470" cy="120" r="6" fill="#475569"/>
  <circle cx="470" cy="392" r="6" fill="#475569"/>
  <circle cx="256" cy="492" r="6" fill="#475569"/>
  <circle cx="42" cy="392" r="6" fill="#475569"/>
  <circle cx="42" cy="120" r="6" fill="#475569"/>

  <!-- Inner HUD / Radar Rings -->
  <circle cx="256" cy="256" r="180" stroke="#10B981" stroke-width="1" stroke-dasharray="10 20" stroke-opacity="0.3"/>
  <circle cx="256" cy="256" r="160" stroke="#10B981" stroke-width="2" stroke-opacity="0.1"/>
  
  <!-- Tactical Compass Markings -->
  <path d="M256 70 L256 90 M256 422 L256 442 M70 256 L90 256 M422 256 L442 256" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>

  <!-- Central Turkish Sovereignty Core -->
  <!-- Stylized Crescent -->
  <path d="M230 180 A 80 80 0 1 0 230 332 A 95 95 0 1 1 230 180 Z" fill="#10B981" filter="url(#glow)"/>
  
  <!-- Five-pointed Star -->
  <path d="M330 220 L338 245 L365 245 L345 262 L352 288 L330 272 L308 288 L315 262 L295 245 L322 245 Z" fill="#10B981" filter="url(#glow)"/>

  <!-- "OFFLINE" Strike - Tactical Red -->
  <rect x="100" y="250" width="312" height="12" fill="#EF4444" transform="rotate(-45 256 256)" opacity="0.8"/>
  <rect x="100" y="250" width="312" height="2" fill="#FCA5A5" transform="rotate(-45 256 256)" opacity="0.5"/>

  <!-- Text: PREPTÜRK -->
  <defs>
    <path id="textPath" d="M100 410 Q 256 460 412 410" />
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <text fill="white" font-family="monospace" font-weight="900" font-size="42" letter-spacing="12">
    <textPath href="#textPath" startOffset="50%" text-anchor="middle">PREPTÜRK</textPath>
  </text>

  <!-- Subtext: COMMAND CENTER -->
  <text x="256" y="115" fill="#94A3B8" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="4">
    SOVEREIGN COMMAND CENTER
  </text>
  
  <text x="256" y="405" fill="#94A3B8" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="2">
    ÇEVRİMDIŞI ÖZERK SİSTEM
  </text>

</svg>
</div>
</body>
</html>
