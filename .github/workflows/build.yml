name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: false
        default: "0.1.0"
      push_to_registry:
        description: "Push images to registry"
        type: boolean
        default: false

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      date_tag: ${{ steps.version.outputs.date_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version tags
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          DATE_TAG=$(date +%Y%m%d-%H%M%S)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "date_tag=${DATE_TAG}" >> $GITHUB_OUTPUT

      - name: Build API image
        run: |
          docker build -f infra/docker/api.Dockerfile \
            -t prepturk-api:${{ steps.version.outputs.version }} \
            -t prepturk-api:${{ steps.version.outputs.date_tag }} \
            .

      - name: Build Worker image
        run: |
          docker build -f infra/docker/worker.Dockerfile \
            -t prepturk-worker:${{ steps.version.outputs.version }} \
            -t prepturk-worker:${{ steps.version.outputs.date_tag }} \
            .

      - name: Build Web image
        run: |
          docker build -f infra/docker/web.Dockerfile \
            -t prepturk-web:${{ steps.version.outputs.version }} \
            -t prepturk-web:${{ steps.version.outputs.date_tag }} \
            .

      - name: Login to GitHub Container Registry
        if: ${{ github.event.inputs.push_to_registry == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push API image
        if: ${{ github.event.inputs.push_to_registry == 'true' }}
        run: |
          docker tag prepturk-api:${{ steps.version.outputs.version }} ghcr.io/${{ github.repository }}/api:${{ steps.version.outputs.version }}
          docker tag prepturk-api:${{ steps.version.outputs.version }} ghcr.io/${{ github.repository }}/api:latest
          docker push ghcr.io/${{ github.repository }}/api:${{ steps.version.outputs.version }}
          docker push ghcr.io/${{ github.repository }}/api:latest

      - name: Tag and push Worker image
        if: ${{ github.event.inputs.push_to_registry == 'true' }}
        run: |
          docker tag prepturk-worker:${{ steps.version.outputs.version }} ghcr.io/${{ github.repository }}/worker:${{ steps.version.outputs.version }}
          docker tag prepturk-worker:${{ steps.version.outputs.version }} ghcr.io/${{ github.repository }}/worker:latest
          docker push ghcr.io/${{ github.repository }}/worker:${{ steps.version.outputs.version }}
          docker push ghcr.io/${{ github.repository }}/worker:latest

      - name: Tag and push Web image
        if: ${{ github.event.inputs.push_to_registry == 'true' }}
        run: |
          docker tag prepturk-web:${{ steps.version.outputs.version }} ghcr.io/${{ github.repository }}/web:${{ steps.version.outputs.version }}
          docker tag prepturk-web:${{ steps.version.outputs.version }} ghcr.io/${{ github.repository }}/web:latest
          docker push ghcr.io/${{ github.repository }}/web:${{ steps.version.outputs.version }}
          docker push ghcr.io/${{ github.repository }}/web:latest

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -n 1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" > /tmp/changelog.md
          else
            git log --pretty=format:"- %s (%h)" > /tmp/changelog.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          body: |
            ## Release v${{ needs.build.outputs.version }}
            Build date: ${{ needs.build.outputs.date_tag }}

            ### Degisiklikler

            $(cat /tmp/changelog.md)
          draft: true
          prerelease: false
          generate_release_notes: true
